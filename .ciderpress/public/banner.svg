  <text class="text dim" font-size="12" x="419" y="294" text-anchor="middle">an opinionated CLI framework for Node.js</text>
  <line x1="16" y1="306" x2="822" y2="306" stroke="#313244" stroke-width="1" />
  <line x1="419" y1="306" x2="419" y2="548" stroke="#313244" stroke-width="1" />

  <rect x="4" y="314" width="80" height="24" rx="4" ry="4" fill="#181825" />
  <text class="tab" x="18" y="330">terminal</text>
  <text class="code" x="18" y="358"><tspan class="prompt">~</tspan><tspan class="dim"> $ </tspan><tspan class="tx">maltty dev</tspan></text>
  <text class="code" x="18" y="386"><tspan class="dim">Starting </tspan><tspan class="brand">my-cli</tspan><tspan class="dim">...</tspan></text>
  <text class="code" x="18" y="402" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Loaded config</tspan></text>
  <text class="code" x="18" y="418" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Registered 3 commands</tspan></text>
  <text class="code" x="18" y="434" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Applied 2 middleware</tspan></text>
  <text class="code" x="18" y="450" xml:space="preserve"><tspan class="st">  ✓</tspan><tspan class="tx"> Watching for changes</tspan></text>
  <text class="code" x="18" y="478"><tspan class="dim">Ready — dev server on :4000</tspan></text>
  <text class="code" x="18" y="510"><tspan class="prompt">~</tspan><tspan class="dim"> $ </tspan><tspan class="tx">&#x2588;</tspan></text>
  <rect x="423" y="314" width="100" height="24" rx="4" ry="4" fill="#181825" />
  <text class="tab" x="437" y="330">deploy.ts</text>
  <line x1="457" y1="342" x2="457" y2="548" stroke="#313244" stroke-width="1" />
  <text class="ln" x="451" y="358">1</text>
  <text class="code" x="467" y="358" xml:space="preserve"><tspan class="kw">import</tspan><tspan class="op"> { </tspan><tspan class="fn">command</tspan><tspan class="op">, </tspan><tspan class="fn">z</tspan><tspan class="op"> } </tspan><tspan class="kw">from</tspan><tspan class="st"> 'maltty'</tspan></text>
  <text class="ln" x="451" y="374">2</text>
  <text class="ln" x="451" y="390">3</text>
  <text class="code" x="467" y="390" xml:space="preserve"><tspan class="kw">export default </tspan><tspan class="fn">command</tspan><tspan class="op">({</tspan></text>
  <text class="ln" x="451" y="406">4</text>
  <text class="code" x="467" y="406" xml:space="preserve"><tspan class="op">  </tspan><tspan class="pr">name</tspan><tspan class="op">: </tspan><tspan class="st">'deploy'</tspan><tspan class="op">,</tspan></text>
  <text class="ln" x="451" y="422">5</text>
  <text class="code" x="467" y="422" xml:space="preserve"><tspan class="op">  </tspan><tspan class="pr">description</tspan><tspan class="op">: </tspan><tspan class="st">'Deploy the app'</tspan><tspan class="op">,</tspan></text>
  <text class="ln" x="451" y="438">6</text>
  <text class="code" x="467" y="438" xml:space="preserve"><tspan class="op">  </tspan><tspan class="pr">args</tspan><tspan class="op">: {</tspan></text>
  <text class="ln" x="451" y="454">7</text>
  <text class="code" x="467" y="454" xml:space="preserve"><tspan class="op">    </tspan><tspan class="pr">env</tspan><tspan class="op">: </tspan><tspan class="fn">z</tspan><tspan class="op">.</tspan><tspan class="fn">string</tspan><tspan class="op">(),</tspan></text>
  <text class="ln" x="451" y="470">8</text>
  <text class="code" x="467" y="470" xml:space="preserve"><tspan class="op">  },</tspan></text>
  <text class="ln" x="451" y="486">9</text>
  <text class="code" x="467" y="486" xml:space="preserve"><tspan class="op">  </tspan><tspan class="kw">async </tspan><tspan class="fn">handler</tspan><tspan class="op">(</tspan><tspan class="vr">ctx</tspan><tspan class="op">) {</tspan></text>
  <text class="ln" x="451" y="502">10</text>
  <text class="code" x="467" y="502" xml:space="preserve"><tspan class="op">    </tspan><tspan class="kw">await </tspan><tspan class="vr">ctx</tspan><tspan class="op">.</tspan><tspan class="pr">output</tspan><tspan class="op">.</tspan><tspan class="fn">spinner</tspan><tspan class="op">(</tspan></text>
  <text class="ln" x="451" y="518">11</text>
  <text class="code" x="467" y="518" xml:space="preserve"><tspan class="op">  },</tspan></text>
  <text class="ln" x="451" y="534">12</text>
  <text class="code" x="467" y="534" xml:space="preserve"><tspan class="op">})</tspan></text>

</svg>
