<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 618">
  <defs>
    <style>
      .terminal-bg { fill: #1e1e2e; }
      .terminal-border { fill: #313244; }
      .title-bar { fill: #181825; }
      .btn-red { fill: #f38ba8; }
      .btn-yellow { fill: #f9e2af; }
      .btn-green { fill: #a6e3a1; }
      .text { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; }
