    <!-- Version and description -->
    <text class="text white" font-size="15" y="294">  maltty <tspan class="dim">v1.4.2</tspan></text>
    <text class="text white" font-size="15" y="318">  An opinionated CLI framework for Node.js.</text>

    <!-- Init output -->
