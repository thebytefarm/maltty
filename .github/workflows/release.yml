name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm run version
          title: 'release: version packages'
          commit: 'release: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # While in `pre` mode, changesets publishes under `--tag rc`, so
      # `npm install <pkg>` stays on whatever was on `latest`, and GitHub marks
      # the prerelease as non-latest. RCs are what users install today, so
      # re-point `latest` (and `rc`) at every just-published version and force
      # the maltty GitHub release to be the repo's Latest.
      - name: Promote published RCs to npm latest + GitHub Latest
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "$PUBLISHED" | jq -c '.[]' | while read -r pkg; do
            name=$(echo "$pkg" | jq -r '.name')
            version=$(echo "$pkg" | jq -r '.version')
            echo "Promoting ${name}@${version} -> latest, rc"
            npm dist-tag add "${name}@${version}" latest
            npm dist-tag add "${name}@${version}" rc
            if [ "$name" = "maltty" ]; then
              echo "Marking ${name}@${version} as GitHub Latest"
              gh release edit "${name}@${version}" --prerelease=false --latest=true --repo "$GITHUB_REPOSITORY"
            fi
          done
